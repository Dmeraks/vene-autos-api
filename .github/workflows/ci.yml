# CI del API (lint, build, tests). Requiere Node 20+ según package.json engines.
name: CI

on:
  push:
    branches: [main, master]
    paths:
      - 'api/**'
      - 'package.json'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'api/**'
      - 'package.json'
      - '.github/workflows/ci.yml'

defaults:
  run:
    working-directory: api

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vene
          POSTGRES_PASSWORD: vene
          POSTGRES_DB: vene_autos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vene -d vene_autos_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://vene:vene@localhost:5432/vene_autos_test?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: api/.nvmrc
          cache: npm
          cache-dependency-path: api/package-lock.json
      - name: Install
        run: npm ci
      - name: Migrate
        run: npx prisma migrate deploy
      - name: Seed
        run: npx prisma db seed
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test
      - name: Integration tests
        run: npm run test:integration
