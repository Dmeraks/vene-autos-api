# CI del API (lint, build, tests). Requiere Node 20+ según package.json engines.
name: CI

on:
  push:
    branches: [main, master]
    paths:
      - 'api/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'api/**'
      - '.github/workflows/ci.yml'

defaults:
  run:
    working-directory: api

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: api/.nvmrc
          cache: npm
          cache-dependency-path: api/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
