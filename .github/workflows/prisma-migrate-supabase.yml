# Aplica migraciones Prisma contra la base en Supabase (manual).
# Configurá en GitHub → Settings → Secrets → Actions:
#   SUPABASE_DATABASE_URL  — URI de la app (p. ej. pooler transaccional 6543 + pgbouncer si aplica)
#   SUPABASE_DIRECT_URL    — URI para migrate (session pooler :5432 o directa con IPv4)
#
# Ejecutar: pestaña Actions → "Prisma migrate (Supabase)" → Run workflow.
name: Prisma migrate (Supabase)

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: api

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: api/.nvmrc
          cache: npm
          cache-dependency-path: api/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.SUPABASE_DIRECT_URL }}
        run: npx prisma migrate deploy
